# -- Container image settings
image:
  repository: ghcr.io/turnstonelabs/turnstone
  tag: ""
  pullPolicy: IfNotPresent

# -- Database configuration
database:
  # Backend type (postgresql)
  backend: postgresql
  # External database settings (used when postgresql.enabled is false)
  external:
    host: ""
    port: 5432
    database: turnstone
    username: turnstone
    existingSecret: ""
    sslmode: prefer

# -- Bitnami PostgreSQL subchart
postgresql:
  enabled: true
  auth:
    database: turnstone
    username: turnstone

# -- Turnstone server (main API + web UI)
server:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  service:
    type: ClusterIP
    port: 8080

# -- Turnstone console (cluster dashboard)
console:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  service:
    type: ClusterIP
    port: 8090

# -- LLM provider configuration
llm:
  baseUrl: ""
  provider: openai
  apiKey: ""
  existingSecret: ""

# -- Authentication (always enabled, JWT secret required)
auth:
  jwtSecret: ""
  existingSecret: ""

# -- Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  #  - host: turnstone.example.com
  #    paths:
  #      - path: /
  #        pathType: Prefix
  #        service: server
  tls: []
  #  - secretName: turnstone-tls
  #    hosts:
  #      - turnstone.example.com
