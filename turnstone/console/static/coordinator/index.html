<!DOCTYPE html>
<html lang="en" data-ws-id="{{WS_ID}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>coordinator · turnstone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/base.css">
<link rel="stylesheet" href="/shared/katex-0.16.45/katex.min.css">
<link rel="stylesheet" href="/static/style.css">
<style>
  /* Coordinator-specific layout — one-pane variant of the server UI. */
  body { display: flex; flex-direction: column; height: 100vh; margin: 0; }
  #coord-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg-elevated);
  }
  #coord-header h1 {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
  }
  #coord-header h1 .dim { color: var(--fg-dim); }
  #coord-status { color: var(--fg-dim); font-size: 0.85rem; }
  #coord-header-spacer { flex: 1; }
  #coord-body {
    flex: 1;
    display: flex;
    flex-direction: row;
    overflow: hidden;
    min-height: 0;
  }
  #coord-main {
    flex: 2 1 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  #coord-sidebar {
    flex: 1 1 0;
    min-width: 260px;
    max-width: 420px;
    border-left: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #coord-sidebar h2 {
    margin: 0;
    padding: 0.5rem 0.75rem 0.35rem;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--fg-dim);
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  #coord-sidebar .refresh-btn {
    margin-left: auto;
    font-size: 0.75rem;
    padding: 0.1rem 0.4rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    color: var(--fg);
  }
  #coord-sidebar .refresh-btn:hover { background: var(--bg-elevated); }
  #coord-sidebar .section-body {
    overflow-y: auto;
    padding: 0.25rem 0.25rem 0.75rem;
  }
  #coord-children-wrap {
    display: flex;
    flex-direction: column;
    flex: 1 1 auto;
    min-height: 40%;
    max-height: 60%;
  }
  #coord-tasks-wrap {
    display: flex;
    flex-direction: column;
    flex: 1 1 auto;
    min-height: 30%;
    border-top: 1px solid var(--border);
  }
  .ch-row, .task-row {
    padding: 0.35rem 0.5rem;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.35;
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
    border: 1px solid transparent;
  }
  .ch-row + .ch-row, .task-row + .task-row { margin-top: 0.15rem; }
  .ch-row:hover, .task-row:hover {
    background: var(--bg-elevated);
    border-color: var(--border);
  }
  .ch-row.closed { opacity: 0.55; }
  .ch-row a.ws-link {
    color: inherit;
    text-decoration: none;
    display: flex;
    gap: 0.35rem;
    align-items: baseline;
  }
  .ch-row a.ws-link:hover { color: var(--accent); }
  .ch-row .glyph { width: 1rem; text-align: center; flex-shrink: 0; }
  .ch-row .glyph-running { color: var(--green); }
  .ch-row .glyph-thinking { color: var(--yellow); }
  .ch-row .glyph-attention { color: var(--red); font-weight: 700; }
  .ch-row .glyph-error { color: var(--red); }
  .ch-row .name { font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .ch-row .meta {
    font-size: 0.72rem;
    color: var(--fg-dim);
    display: flex;
    gap: 0.5rem;
    padding-left: 1.35rem;
  }
  .ch-row .badge-attention {
    color: var(--red);
    font-weight: 600;
  }
  .task-row .title { font-weight: 500; }
  .task-row .meta { font-size: 0.72rem; color: var(--fg-dim); }
  .task-row .status {
    display: inline-block;
    padding: 0.05rem 0.35rem;
    border-radius: 3px;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-right: 0.35rem;
    border: 1px solid var(--border);
  }
  .task-row .status-pending { color: var(--fg-dim); }
  .task-row .status-in_progress { color: var(--yellow); border-color: var(--yellow); }
  .task-row .status-done { color: var(--green); border-color: var(--green); opacity: 0.7; }
  .task-row .status-blocked { color: var(--red); border-color: var(--red); }
  .sidebar-empty {
    padding: 0.5rem 0.75rem;
    font-size: 0.78rem;
    color: var(--fg-dim);
    font-style: italic;
  }
  /* Brief flash when a task-row "\u2192 child" link scrolls into the
     tree — signals the click resolved without the user hunting for
     which row was the target. */
  .ch-row.highlight {
    background: var(--yellow-glow);
    border-color: var(--yellow);
    transition: background 0.6s ease-out, border-color 0.6s ease-out;
  }
  @media (prefers-reduced-motion: reduce) {
    .ch-row.highlight { transition: none; }
  }
  #coord-sidebar .refresh-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  #coord-sidebar-toggle {
    display: none;
    background: transparent;
    border: none;
    color: var(--fg);
    cursor: pointer;
    padding: 0.1rem 0.35rem;
    font-family: inherit;
    font-size: 0.85rem;
  }
  #coord-sidebar-toggle:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  [aria-busy="true"].section-body { opacity: 0.55; }
  #coord-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.5rem;
  }
  .coord-msg {
    margin-bottom: 0.75rem;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
  }
  .coord-msg.role-user { border-color: var(--accent); }
  .coord-msg.role-assistant { border-color: var(--border); }
  .coord-msg.role-tool {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    background: var(--code-bg);
  }
  .coord-msg.role-error {
    border-color: var(--red);
    color: var(--red);
  }
  .coord-msg .role-label {
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--fg-dim);
    margin-bottom: 0.25rem;
  }
  .coord-msg .coord-ws-link {
    color: var(--accent);
    text-decoration: underline;
  }
  #coord-composer {
    display: flex;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    background: var(--bg-elevated);
  }
  #coord-input {
    flex: 1;
    min-height: 2.5rem;
    max-height: 10rem;
    padding: 0.5rem 0.75rem;
    font-family: inherit;
    font-size: 0.95rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    resize: vertical;
  }
  #coord-send-btn {
    padding: 0 1.2rem;
    font-weight: 600;
  }
  #coord-approval-bar {
    padding: 0.75rem 1rem;
    background: var(--yellow-glow);
    border-top: 1px solid var(--yellow);
    display: none;
  }
  #coord-approval-bar.visible { display: block; }
  #coord-approval-bar .label { font-weight: 600; margin-bottom: 0.25rem; }
  #coord-approval-bar .tool-row { margin-bottom: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; }
  #coord-approval-bar .btn-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  #coord-approval-bar button { padding: 0.35rem 0.75rem; }
  #coord-approval-bar button:disabled { opacity: 0.55; cursor: wait; }
  #coord-approval-bar .approval-header {
    font-weight: 600;
    margin-bottom: 0.35rem;
    font-family: inherit;
  }
  /* Deny-destructive button gets a red border so it reads faster than
     the green/neutral approve variants. */
  #coord-deny-btn { border-color: var(--red); color: var(--red); }
  /* Reasoning bubbles are dimmed + italic so they read as pre-content
     commentary rather than the final assistant reply. */
  .coord-msg.role-reasoning {
    color: var(--fg-dim);
    font-style: italic;
    border-style: dashed;
  }
  #coord-sse-status {
    color: var(--fg-dim);
    font-size: 0.8rem;
  }
  #coord-sse-status.ok { color: var(--green); }
  #coord-sse-status.err { color: var(--red); }

  /* Sub-700px: wrap the header so the buttons don't overflow off-screen
     on phone-sized viewports. */
  @media (max-width: 700px) {
    #coord-header {
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
    }
    #coord-header h1 { font-size: 1rem; }
    #coord-header-spacer { flex-basis: 100%; height: 0; }
    #coord-messages { padding: 0.75rem 1rem; }
    #coord-composer { padding: 0.5rem 0.75rem; }
    /* On phones the soft keyboard eats vertical space — cap the input
       and disable drag-resize so the composer stays in view. */
    #coord-input {
      resize: none;
      max-height: 6rem;
    }
    /* Sidebar collapses to an accordion above the chat on phones; the
       full tree is reachable by expanding but doesn't eat the chat view. */
    #coord-body { flex-direction: column; }
    #coord-sidebar {
      max-width: none;
      border-left: none;
      border-bottom: 1px solid var(--border);
      max-height: 50vh;
    }
    #coord-sidebar-toggle { display: inline-flex; }
    #coord-sidebar[aria-expanded="false"] #coord-children-wrap,
    #coord-sidebar[aria-expanded="false"] #coord-tasks-wrap {
      display: none;
    }
    #coord-sidebar[aria-expanded="false"] { max-height: none; }
  }
</style>
</head>
<body>

<div id="coord-header">
  <h1>turnstone <span class="dim">coordinator</span></h1>
  <span id="coord-name"></span>
  <span id="coord-status"></span>
  <span id="coord-header-spacer"></span>
  <span id="coord-sse-status" aria-live="polite">connecting…</span>
  <button id="coord-cancel-btn" class="header-btn" style="display:none" onclick="coordCancel()">cancel</button>
  <button id="coord-close-btn" class="header-btn" onclick="coordCloseSession()" title="Close this coordinator session">close</button>
  <button id="theme-toggle" class="header-btn" onclick="toggleTheme()" aria-label="Toggle light/dark theme">&#9790;</button>
</div>

<div id="coord-body">
  <div id="coord-main">
    <!-- aria-live starts polite; coordinator.js flips it to "off" during
         streaming and back to "polite" on stream_end so screen readers
         don't re-announce partial content on every token. -->
    <div id="coord-messages" role="log" aria-live="polite"></div>

    <!-- Region (not alertdialog) because we don't trap focus; buttons are
         reachable in normal tab order.  role=alertdialog implies a modal
         focus trap per WAI-ARIA. -->
    <div id="coord-approval-bar" role="region" aria-label="Approval required" aria-live="assertive">
      <div id="coord-approval-label" class="label">Approval required</div>
      <div id="coord-approval-tools"></div>
      <div class="btn-row">
        <button id="coord-approve-btn" onclick="coordApprove(true, false)">Approve</button>
        <button id="coord-approve-always-btn" onclick="coordApprove(true, true)">Approve (always)</button>
        <button id="coord-deny-btn" onclick="coordApprove(false, false)">Deny</button>
      </div>
    </div>

    <form id="coord-composer" onsubmit="return coordSend(event)">
      <textarea id="coord-input" rows="1" placeholder="Message the coordinator…" aria-label="Coordinator input"></textarea>
      <button id="coord-send-btn" type="submit">send</button>
    </form>
  </div>

  <aside id="coord-sidebar" aria-expanded="true" aria-label="Coordinator children and tasks">
    <!-- Mobile-only toggle — on desktop the sidebar is always visible
         beside the chat pane; on <700px viewports it collapses into an
         accordion that only shows its heading row until tapped. -->
    <button id="coord-sidebar-toggle"
            type="button"
            aria-controls="coord-children-wrap coord-tasks-wrap"
            aria-expanded="true">
      <span id="coord-sidebar-toggle-glyph" aria-hidden="true">&#9662;</span>
      <span>Children &amp; tasks</span>
    </button>
    <div id="coord-children-wrap">
      <h2 id="coord-children-heading">
        <span>Children</span>
        <span id="coord-children-count" class="dim"></span>
        <button type="button" class="refresh-btn" id="coord-children-refresh" aria-label="Refresh children list" title="Refresh children">&#8635;</button>
      </h2>
      <!-- role="list" only — no aria-live.  The sidebar's DOM churns
           on every child state tick and fan-out re-render would flood
           screen readers.  If we need targeted announcements later,
           emit them via a dedicated off-screen polite live region. -->
      <div id="coord-children-tree"
           class="section-body"
           role="list"
           aria-labelledby="coord-children-heading"></div>
    </div>
    <div id="coord-tasks-wrap">
      <h2 id="coord-tasks-heading">
        <span>Tasks</span>
        <span id="coord-tasks-count" class="dim"></span>
        <button type="button" class="refresh-btn" id="coord-tasks-refresh" aria-label="Refresh task list" title="Refresh tasks">&#8635;</button>
      </h2>
      <div id="coord-tasks"
           class="section-body"
           role="list"
           aria-labelledby="coord-tasks-heading"></div>
    </div>
  </aside>
</div>

<!-- Shared-static import order matches the console dashboard
     (console/static/index.html) so global shortcuts (kb.js) and helpers
     register in the expected sequence.  The renderer libs (katex, hljs,
     renderer.js) match the server UI (ui/static/index.html) so the
     coordinator page can call renderMarkdown / postRenderMarkdown on
     streamed assistant content.  renderer.js is mirrored from the ui
     package — see its header comment. -->
<script src="/shared/utils.js"></script>
<script src="/shared/toast.js"></script>
<script src="/shared/theme.js"></script>
<script src="/shared/auth.js"></script>
<script src="/shared/kb.js"></script>
<script src="/shared/katex-0.16.45/katex.min.js"></script>
<script src="/shared/hljs-11.11.1/highlight.min.js"></script>
<script src="/static/coordinator/renderer.js"></script>
<script src="/static/coordinator/coordinator.js"></script>
</body>
</html>
